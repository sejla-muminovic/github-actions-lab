name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Provjera koda (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Postavi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Instaliraj zavisnosti
        run: npm ci
      - name: Pokreni ESLint
        run: npm run lint

  test:
    name: Pokretanje Testova
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Postavi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Instaliraj zavisnosti
        run: npm ci
      - name: Pokreni testove
        run: npm test
