name: Matrix Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test Node ${{ matrix.node-version }} na ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: windows-latest
            node-version: 18.x
          - os: macos-latest
            node-version: 18.x
        include:
          - os: ubuntu-latest
            node-version: 20.x
            experimental: true
            extra-flag: "--coverage"
    steps:
      - uses: actions/checkout@v4
      - name: Postavi Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Instaliraj zavisnosti
        run: npm ci
      - name: Pokreni testove s flagovima
        run: npm test -- ${{ matrix.extra-flag || '' }}
      - name: Eksperimentalno upozorenje
        if: matrix.experimental == true
        run: echo "Ovo je eksperimentalna kombinacija!"
      - name: Ispisi okruzenje
        run: node --version && npm --version
