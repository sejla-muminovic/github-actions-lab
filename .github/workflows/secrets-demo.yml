name: Demo Secreta

on: workflow_dispatch

jobs:
  deploy-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Provjera autentičnosti
        env:
          API_KEY: ${{ secrets.APP_API_KEY }}
        run: |
          echo "Provjera API kljuca..."
          if [ -z "$API_KEY" ]; then
            echo "GRESKA: API kljuc nije postavljen!"
            exit 1
          fi
          echo "API kljuc je dostupan (maskiran u logovima)"
          echo "Vrijednost: $API_KEY"

      - name: Simulacija deploymenta
        env:
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          echo "Konektujem se na bazu..."
          echo "Saljam notifikaciju na: $EMAIL"
          echo "Deployment uspjesan!"

  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy u produkciju
        env:
          KEY: ${{ secrets.DEPLOY_KEY }}
        run: echo "Deployujem u produkciju..."
